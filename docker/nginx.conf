limit_req_zone $binary_remote_addr zone=geral:10m rate=50r/m;
limit_req_zone $binary_remote_addr zone=sensivel:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/html/public;
    index index.php;

    location ^~ /assets/ {
        access_log off;
        log_not_found off;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot)$ {
        access_log off;
        log_not_found off;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /login {
        limit_req zone=sensivel burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://php:80;
        include /etc/nginx/proxy_params;
    }

    location /signup {
        limit_req zone=sensivel burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://php:80;
        include /etc/nginx/proxy_params;
    }

    location / {
        limit_req zone=geral burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://php:80;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 81;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_req zone=sensivel burst=3 nodelay;
    limit_req_status 429;

    location / {
        auth_basic "Acesso restrito";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://phpmyadmin:80;
        include /etc/nginx/proxy_params;
    }
}

log_format json escape=json
'{
  "ip": "$remote_addr",
  "time": "$time_iso8601",
  "method": "$request_method",
  "uri": "$request_uri",
  "status": $status,
  "bytes": $body_bytes_sent,
  "referrer": "$http_referer",
  "user_agent": "$http_user_agent"
}';

access_log /var/log/nginx/access.log json;